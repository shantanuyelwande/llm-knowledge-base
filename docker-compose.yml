version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    command: python backend/main.py

  frontend:
    image: python:3.11-slim
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/srv
    working_dir: /srv
    command: python -m http.server 5173
    depends_on:
      - backend

volumes:
  data:
