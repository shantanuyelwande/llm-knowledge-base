name: Ingest URL Content

on:
  repository_dispatch:
    types: [ingest-url]

permissions:
  contents: write
  actions: read

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Debug - Check payload
        run: |
          echo "📋 Received payload:"
          echo "  URL: ${{ github.event.client_payload.url }}"
          echo "  Description: ${{ github.event.client_payload.description }}"
          echo "  Triggered at: ${{ github.event.client_payload.triggered_at }}"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firecrawl-py

      - name: Scrape URL
        id: scrape
        env:
          URL: ${{ github.event.client_payload.url }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          python << 'EOF'
          import os
          from datetime import datetime
          from urllib.parse import urlparse
          from firecrawl import FirecrawlApp

          url = os.environ.get('URL')
          if not url:
              print("Error: URL is required")
              exit(1)

          print(f"Scraping: {url}")

          try:
              app = FirecrawlApp(api_key=os.environ['FIRECRAWL_API_KEY'])
              result = app.scrape_url(url, formats=['markdown'])

              markdown_content = result.markdown
              title_text = (result.metadata or {}).get('title') or 'Untitled'

              parsed_url = urlparse(url)
              domain = parsed_url.netloc.replace('www.', '').replace('.', '-')
              path = parsed_url.path.strip('/').replace('/', '-')
              timestamp = datetime.now().strftime("%s")
              filename = f"{domain}-{path[:50]}-{timestamp}.md" if path else f"{domain}-{timestamp}.md"

              os.makedirs('data/raw', exist_ok=True)
              filepath = f"data/raw/{filename}"

              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write("---\n")
                  f.write(f"source_url: {url}\n")
                  f.write(f"ingested_from: url\n")
                  f.write(f"ingested_at: {datetime.now().isoformat()}\n")
                  f.write("---\n\n")
                  f.write(f"# {title_text}\n\n")
                  f.write(f"**Source URL:** [{url}]({url})\n")
                  f.write(f"**Ingested:** {datetime.now().isoformat()}\n\n")
                  f.write("---\n\n")
                  f.write(markdown_content)

              print(f"✓ Successfully scraped and saved to {filepath}")

              with open(os.environ.get('GITHUB_OUTPUT', '/tmp/github_output'), 'a') as out:
                  out.write(f"filename={filename}\n")
                  out.write(f"filepath={filepath}\n")

          except Exception as e:
              print(f"❌ Error: {e}")
              exit(1)
          EOF
      
      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Commit and push
        run: |
          git add data/raw/ || true
          
          if ! git diff --quiet --cached; then
            git commit -m "chore: ingest URL content from ${{ github.event.client_payload.url }}"
            git push origin HEAD:${{ github.ref }}
            echo "✅ Successfully committed and pushed"
          else
            echo "ℹ️  No changes to commit"
          fi
      
      - name: Debug if failed
        if: failure()
        run: |
          echo "Error details:"
          ls -la data/raw/ || echo "data/raw/ directory not found"
          git status
          git log --oneline -5
