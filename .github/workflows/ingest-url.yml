name: Ingest URL Content

on:
  repository_dispatch:
    types: [ingest-url]

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 html2text
      
      - name: Scrape URL
        id: scrape
        env:
          URL: ${{ github.event.client_payload.url }}
        run: |
          python << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import html2text
          import os
          from datetime import datetime
          from urllib.parse import urlparse
          
          url = os.environ.get('URL')
          if not url:
              print("Error: URL is required")
              exit(1)
          
          print(f"Scraping: {url}")
          
          try:
              # Fetch the content
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              }
              response = requests.get(url, headers=headers, timeout=10)
              response.raise_for_status()
              
              # Parse HTML
              soup = BeautifulSoup(response.content, 'html.parser')
              
              # Remove script and style elements
              for script in soup(["script", "style"]):
                  script.decompose()
              
              # Get title
              title = soup.find('h1')
              if title:
                  title_text = title.get_text(strip=True)
              else:
                  title_text = soup.title.string if soup.title else "Untitled"
              
              # Convert HTML to Markdown
              h = html2text.HTML2Text()
              h.ignore_links = False
              h.body_width = 0
              markdown_content = h.handle(str(soup))
              
              # Create filename from URL
              parsed_url = urlparse(url)
              domain = parsed_url.netloc.replace('www.', '').replace('.', '-')
              path = parsed_url.path.strip('/').replace('/', '-')
              timestamp = datetime.now().strftime("%s")
              filename = f"{domain}-{path[:50]}-{timestamp}.md" if path else f"{domain}-{timestamp}.md"
              
              # Ensure data/raw directory exists
              os.makedirs('data/raw', exist_ok=True)
              filepath = f"data/raw/{filename}"
              
              # Write content with metadata
              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(f"# {title_text}\n\n")
                  f.write(f"**Source:** [{url}]({url})\n")
                  f.write(f"**Scraped:** {datetime.now().isoformat()}\n\n")
                  f.write("---\n\n")
                  f.write(markdown_content)
              
              print(f"✓ Successfully scraped and saved to {filepath}")
              print(f"::set-output name=filename::{filename}")
              print(f"::set-output name=filepath::{filepath}")
              
          except requests.RequestException as e:
              print(f"Error fetching URL: {e}")
              exit(1)
          except Exception as e:
              print(f"Error processing content: {e}")
              exit(1)
          EOF
      
      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Commit and push
        if: always()
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add data/raw/
            git commit -m "chore: ingest URL content - ${{ github.event.client_payload.url }}"
            git push
            echo "✓ Committed to data/raw/"
          else
            echo "No changes to commit"
          fi
      
      - name: Notify if error
        if: failure()
        run: |
          echo "::error::Failed to scrape URL: ${{ github.event.client_payload.url }}"
