name: Daily Wiki Sync

on:
  schedule:
    # Run daily at 2 AM UTC (adjust as needed)
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install typer pydantic pydantic-settings anthropic rich

      - name: Create .env file
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env

      - name: Pull latest changes
        run: |
          git pull origin HEAD:${{ github.ref }}

      - name: Compile all raw documents to wiki
        run: |
          python3 cli/main.py compile-all

      - name: Apply forward links (cross-references)
        run: |
          python3 cli/main.py backlinks

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        run: |
          git add data/wiki/ || true

          if ! git diff --quiet --cached; then
            git commit -m "chore: daily wiki sync - compile raw files and update cross-references"
            git push origin HEAD:${{ github.ref }}
            echo "✅ Successfully committed and pushed wiki changes"
          else
            echo "ℹ️  No changes to commit"
          fi

      - name: Summary
        if: always()
        run: |
          echo "📊 Sync Summary"
          echo "=============="
          echo "Wiki files: $(find data/wiki -name '*.md' -type f | wc -l)"
          echo "Raw files: $(find data/raw -type f ! -name '.gitkeep' | wc -l)"
          echo "Last updated: $(date)"
