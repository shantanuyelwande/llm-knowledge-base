name: Full Wiki Rebuild

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: Custom commit message (optional)
        required: false
        default: "chore: full wiki rebuild - recompile all sources and regenerate indexes"

permissions:
  contents: write
  actions: read

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install typer pydantic pydantic-settings anthropic==0.42.0 rich

      - name: Create .env file
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env

      - name: Pull latest changes
        run: |
          git pull origin HEAD:${{ github.ref }}

      - name: Compile ALL raw documents (full rebuild)
        run: |
          python3 cli/main.py compile-all

      - name: Regenerate indexes and cross-references
        run: |
          python3 cli/main.py backlinks
          python3 cli/main.py index

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        run: |
          git add data/wiki/ || true
          git add data/raw/ || true

          if ! git diff --quiet --cached; then
            git commit -m "${{ github.event.inputs.commit_message }}"
            git push origin HEAD:${{ github.ref }}
            echo "✅ Successfully committed and pushed changes"
          else
            echo "ℹ️  No changes to commit"
          fi

      - name: Summary
        if: always()
        run: |
          echo "🔨 Full Rebuild Summary"
          echo "======================"
          echo "Wiki files: $(find data/wiki -name '*.md' -type f | wc -l)"
          echo "Raw files: $(find data/raw -type f ! -name '.gitkeep' | wc -l)"
          echo "Completed at: $(date)"
