<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingest URL - LLM Knowledge Base</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .button-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .button-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .button-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .button-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .button-secondary:hover {
            background: #e0e0e0;
        }
        
        .status {
            margin-top: 24px;
            padding: 16px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .status.loading {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #555;
        }
        
        .info-box strong {
            color: #333;
        }
        
        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 8px;
        }
        
        .loader::after {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid currentColor;
            border-color: currentColor transparent currentColor transparent;
            animation: loader 1.2s linear infinite;
        }
        
        @keyframes loader {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        a {
            color: #667eea;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📥 Ingest URL</h1>
            <p>Add web content to your knowledge base</p>
        </div>
        
        <div class="info-box">
            <strong>How it works:</strong> Paste a URL below and we'll scrape the content, convert it to Markdown, and commit it to your repository.
        </div>
        
        <form id="ingestForm">
            <div class="form-group">
                <label for="urlInput">URL to Scrape *</label>
                <input 
                    type="text" 
                    id="urlInput" 
                    placeholder="https://example.com/article" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="descriptionInput">Description (optional)</label>
                <textarea 
                    id="descriptionInput" 
                    placeholder="Add notes about this content..."
                ></textarea>
            </div>
            
            <div class="button-group">
                <button type="submit" class="button-submit">
                    <span id="buttonText">Ingest URL</span>
                </button>
                <button type="reset" class="button-secondary">Clear</button>
            </div>
            
            <div id="status" class="status">
                <span id="statusMessage"></span>
            </div>
        </form>
    </div>

    <script>
        const GITHUB_OWNER = 'shantanuyelwande'; // CHANGE THIS to your GitHub username
        const GITHUB_REPO = 'llm-knowledge-base'; // CHANGE THIS to your repo name
        const GITHUB_TOKEN = localStorage.getItem('github_token');
        
        const form = document.getElementById('ingestForm');
        const urlInput = document.getElementById('urlInput');
        const statusDiv = document.getElementById('status');
        const statusMessage = document.getElementById('statusMessage');
        const buttonText = document.getElementById('buttonText');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = urlInput.value.trim();
            const description = document.getElementById('descriptionInput').value.trim();
            
            if (!url) {
                showStatus('Please enter a valid URL', 'error');
                return;
            }
            
            if (!GITHUB_TOKEN) {
                showStatus('❌ GitHub token not set. Update the form to set your token first.', 'error');
                return;
            }
            
            // Validate URL
            try {
                new URL(url);
            } catch {
                showStatus('❌ Invalid URL format', 'error');
                return;
            }
            
            await triggerWorkflow(url, description);
        });
        
        async function triggerWorkflow(url, description) {
            showStatus('⏳ Triggering workflow...', 'loading');
            
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/dispatches`,
                    {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/vnd.github.v3+json',
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            event_type: 'ingest-url',
                            client_payload: {
                                url: url,
                                description: description,
                                triggered_at: new Date().toISOString()
                            }
                        })
                    }
                );
                
                if (response.ok) {
                    showStatus(
                        '✅ Workflow triggered! Check your <a href="https://github.com/' + GITHUB_OWNER + '/' + GITHUB_REPO + '/actions" target="_blank">GitHub Actions</a> for progress.',
                        'success'
                    );
                    form.reset();
                } else if (response.status === 401) {
                    showStatus('❌ Invalid or expired token. Please update it.', 'error');
                    localStorage.removeItem('github_token');
                } else if (response.status === 403) {
                    showStatus('❌ Permission denied. Check your token permissions.', 'error');
                } else if (response.status === 404) {
                    showStatus('❌ Repository not found. Verify owner and repo name.', 'error');
                } else {
                    const error = await response.text();
                    showStatus('❌ Error: ' + error, 'error');
                }
            } catch (error) {
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }
        
        function showStatus(message, type) {
            statusMessage.innerHTML = message;
            statusDiv.className = `status show ${type}`;
        }
        
        // Initialize: Check if token is set, if not show prompt
        document.addEventListener('DOMContentLoaded', () => {
            if (!GITHUB_TOKEN) {
                const token = prompt(
                    'GitHub Personal Access Token required!\n\n' +
                    'Paste your token (see instructions in README).\n\n' +
                    'Token will be stored locally in your browser only.'
                );
                
                if (token) {
                    localStorage.setItem('github_token', token.trim());
                    location.reload();
                }
            }
        });
    </script>
</body>
</html>
